spring.application.name=sales-management-backend
spring.profiles.active=dev
server.port=8080
app.reset-token.expiry-minutes=15
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Mail (override in profile/env as needed)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Cache/Redis (override in profile/env as needed)
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=512KB
server.tomcat.max-part-count=20
