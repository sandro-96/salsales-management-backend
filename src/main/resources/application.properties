spring.application.name=sales-management-backend
spring.profiles.active=dev
server.port=8080
app.reset-token.expiry-minutes=15
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}

# Mail (override in profile/env as needed)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Cache/Redis (override in profile/env as needed)
spring.cache.type=${SPRING_CACHE_TYPE:simple}
spring.redis.host=${REDIS_HOST:localhost}
spring.redis.port=${REDIS_PORT:6379}

# Multipart upload limits
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=512KB
server.tomcat.max-part-count=20

# Subscription billing (trial 30d -> BASIC 99k/month)
# Gateway mặc định cho luồng /subscription/pay. Giá trị hợp lệ: MANUAL, VNPAY, MOMO.
# Mặc định chuyển khoản + admin xác nhận (VNPay/MoMo bật qua env khi cần).
app.payment.gateway=${APP_PAYMENT_GATEWAY:MANUAL}

# Thông tin TK nhận phí subscription (99k) — shop xem trên /billing; QR VietQR nếu có BIN + số TK.
app.billing.transfer.enabled=${BILLING_TRANSFER_ENABLED:true}
app.billing.transfer.bank-name=${BILLING_BANK_NAME:}
app.billing.transfer.account-number=${BILLING_ACCOUNT_NUMBER:}
app.billing.transfer.account-holder=${BILLING_ACCOUNT_HOLDER:}
app.billing.transfer.viet-qr-bank-bin=${BILLING_VIETQR_BANK_BIN:}
app.billing.transfer.static-qr-image-url=${BILLING_STATIC_QR_URL:}
app.billing.transfer.transfer-content-template=${BILLING_TRANSFER_CONTENT_TEMPLATE:GD {transactionId}}

# VNPay (sandbox config — production: set env vars tương ứng).
# Docs: https://sandbox.vnpayment.vn/apis/docs/thanh-toan-pay/pay.html
app.payment.vnpay.tmn-code=${VNPAY_TMN_CODE:}
app.payment.vnpay.hash-secret=${VNPAY_HASH_SECRET:}
app.payment.vnpay.pay-url=${VNPAY_PAY_URL:https://sandbox.vnpayment.vn/paymentv2/vpcpay.html}
app.payment.vnpay.query-url=${VNPAY_QUERY_URL:https://sandbox.vnpayment.vn/merchant_webapi/api/transaction}
# Frontend URL người dùng được redirect tới sau khi thanh toán.
app.payment.vnpay.return-url=${VNPAY_RETURN_URL:http://localhost:5173/billing}
# Thời gian giao dịch tồn tại trên VNPay (phút) — hết thì gateway tự fail.
app.payment.vnpay.expire-minutes=${VNPAY_EXPIRE_MINUTES:15}

# MoMo (sandbox config — production: set env vars tương ứng).
# Docs: https://developers.momo.vn/v3/docs/payment/api/wallet/onetime/
app.payment.momo.partner-code=${MOMO_PARTNER_CODE:}
app.payment.momo.access-key=${MOMO_ACCESS_KEY:}
app.payment.momo.secret-key=${MOMO_SECRET_KEY:}
app.payment.momo.endpoint=${MOMO_ENDPOINT:https://test-payment.momo.vn/v2/gateway/api}
app.payment.momo.redirect-url=${MOMO_REDIRECT_URL:http://localhost:5173/billing}
app.payment.momo.ipn-url=${MOMO_IPN_URL:http://localhost:8080/api/webhook/momo}
app.payment.momo.request-type=${MOMO_REQUEST_TYPE:captureWallet}
