<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Yêu cầu hỗ trợ mới</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f5f6f8; margin: 0; padding: 24px;">
<div style="max-width: 640px; margin: auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #d9534f; margin-top: 0;">🆘 Yêu cầu hỗ trợ mới</h2>

    <p>Chào <strong th:text="${adminName}">Admin</strong>,</p>

    <p>Cửa hàng <strong th:text="${shopName}">Tên cửa hàng</strong> vừa gửi một yêu cầu hỗ trợ
        với mức ưu tiên
        <span style="display: inline-block; padding: 2px 8px; background: #fdecea; color: #d9534f; border-radius: 4px; font-weight: bold;"
              th:text="${priority}">HIGH</span>.</p>

    <table style="width: 100%; border-collapse: collapse; margin-top: 16px;">
        <tr>
            <td style="padding: 6px 0; color: #666; width: 140px;">Người gửi</td>
            <td style="padding: 6px 0;">
                <strong th:text="${creatorName}">Tên</strong>
                (<span th:text="${creatorEmail}">email</span>)
            </td>
        </tr>
        <tr>
            <td style="padding: 6px 0; color: #666;">Phân loại</td>
            <td style="padding: 6px 0;" th:text="${category}">GENERAL</td>
        </tr>
        <tr>
            <td style="padding: 6px 0; color: #666;">Tiêu đề</td>
            <td style="padding: 6px 0;"><strong th:text="${subject}">Tiêu đề ticket</strong></td>
        </tr>
    </table>

    <div style="margin-top: 16px; padding: 12px 16px; background: #fafafa; border-left: 3px solid #d9534f; white-space: pre-wrap;"
         th:text="${message}">Nội dung yêu cầu.</div>

    <p style="margin-top: 24px;">
        <a th:href="${ticketUrl}" href="#"
           style="display: inline-block; background: #d9534f; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">
            Mở ticket trên trang quản trị
        </a>
    </p>

    <hr style="margin-top: 28px; border: none; border-top: 1px solid #eee;">
    <p style="font-size: 12px; color: #999;">Đây là email tự động từ SalesApp — hệ thống hỗ trợ khách hàng.</p>
</div>
</body>
</html>
