<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Phản hồi mới trên ticket</title>
</head>
<body style="font-family: Arial, sans-serif; background: #f5f6f8; margin: 0; padding: 24px;">
<div style="max-width: 640px; margin: auto; background: #fff; padding: 24px; border-radius: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.05);">
    <h2 style="color: #2f7ed8; margin-top: 0;">💬 Bạn có phản hồi mới</h2>

    <p>Chào <strong th:text="${recipientName}">Khách hàng</strong>,</p>

    <p>Ticket
        "<strong th:text="${subject}">Tiêu đề</strong>"
        (mức
        <span th:text="${priority}">HIGH</span>)
        vừa nhận được phản hồi từ
        <strong th:text="${replierName}">Nhân viên hỗ trợ</strong>.</p>

    <div style="margin-top: 16px; padding: 12px 16px; background: #fafafa; border-left: 3px solid #2f7ed8; white-space: pre-wrap;"
         th:text="${replyMessage}">Nội dung phản hồi.</div>

    <p style="margin-top: 24px;">
        <a th:href="${ticketUrl}" href="#"
           style="display: inline-block; background: #2f7ed8; color: #fff; padding: 10px 18px; border-radius: 6px; text-decoration: none;">
            Xem ticket
        </a>
    </p>

    <hr style="margin-top: 28px; border: none; border-top: 1px solid #eee;">
    <p style="font-size: 12px; color: #999;">Đây là email tự động từ SalesApp — hệ thống hỗ trợ khách hàng.</p>
</div>
</body>
</html>
