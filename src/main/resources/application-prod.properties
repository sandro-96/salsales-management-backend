spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=${MONGODB_DATABASE:salesdb}
app.jwt.secret=${APP_JWT_SECRET}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.frontend.verify-url=${FRONTEND_VERIFY_URL:https://yourdomain.com/verify}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=512KB
server.tomcat.max-part-count=20
# AWS S3
aws.s3.access-key=${AWS_ACCESS_KEY}
aws.s3.secret-key=${AWS_SECRET_KEY}
aws.s3.region=${AWS_REGION:ap-southeast-1}
aws.s3.bucket=${AWS_S3_BUCKET}
spring.jackson.time-zone=Asia/Ho_Chi_Minh
logging.level.org.springdoc=DEBUG
webhook.secret=${WEBHOOK_SECRET}
app.fe.url=${FRONTEND_URL}
app.reset-token.expiry-minutes=15
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379
