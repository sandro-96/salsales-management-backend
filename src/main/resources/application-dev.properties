spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGODB_DATABASE:salesdb-dev}

# Dev-only default so you can run locally without exporting secrets.
# Override via APP_JWT_SECRET in your environment for anything shared.
app.jwt.secret=${APP_JWT_SECRET:dev-insecure-change-me-dev-insecure-change-me-32bytes}

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

app.frontend.verify-url=${FRONTEND_VERIFY_URL:http://localhost:5173/verify}
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=30MB
spring.servlet.multipart.file-size-threshold=512KB
server.tomcat.max-part-count=20
# AWS S3
aws.s3.access-key=${AWS_ACCESS_KEY:}
aws.s3.secret-key=${AWS_SECRET_KEY:}
aws.s3.region=${AWS_REGION:ap-southeast-1}
aws.s3.bucket=${AWS_S3_BUCKET:dummy-bucket}
spring.jackson.time-zone=Asia/Ho_Chi_Minh
webhook.secret=${WEBHOOK_SECRET:dev-webhook-secret}
logging.level.org.springframework.data.mongodb.core.MongoTemplate=DEBUG
app.fe.url=${FRONTEND_URL:http://localhost:5173}
app.reset-token.expiry-minutes=15
app.google.client-id=${GOOGLE_CLIENT_ID}
app.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.cache.type=simple
#spring.cache.type=redis
spring.redis.host=localhost
spring.redis.port=6379